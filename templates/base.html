<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensemble FER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png')}}" type="image/x-icon">
</head>

<body>
    {% include "components/header.html" %}

    <main class="main-content">
        {% block content %} {% endblock %}
    </main>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-inner">
            <div class="spinner" aria-hidden="true"></div>
                <div id="loading-text">Loading models...</div>
        </div>
    </div>

    <video id="video-feed-dash" autoplay muted playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
